<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24" role="img" aria-label="대한민국 국기">
  <rect width="36" height="24" fill="#fff"/>
  <!-- Taegeuk: red/blue yin-yang tilted along the flag diagonal (atan(2/3)=33.69°). -->
  <g transform="rotate(-33.69 18 12)">
    <circle cx="18" cy="12" r="6" fill="#cd2e3a"/>
    <path d="M18 6 A3 3 0 0 1 18 12 A3 3 0 0 0 18 18 A6 6 0 0 0 18 6 Z" fill="#0047a0"/>
  </g>
  <!-- Four trigrams, one per corner. -->
  <g fill="#000">
    <!-- Top-left · Geon ☰ (three solid) -->
    <rect x="3.5" y="3.4" width="7" height="1"/>
    <rect x="3.5" y="5.5" width="7" height="1"/>
    <rect x="3.5" y="7.6" width="7" height="1"/>
    <!-- Bottom-left · Ri ☲ (solid, broken, solid) -->
    <rect x="3.5" y="15.4" width="7" height="1"/>
    <rect x="3.5" y="17.5" width="3" height="1"/>
    <rect x="7.5" y="17.5" width="3" height="1"/>
    <rect x="3.5" y="19.6" width="7" height="1"/>
    <!-- Top-right · Gam ☵ (broken, solid, broken) -->
    <rect x="25.5" y="3.4" width="3" height="1"/>
    <rect x="29.5" y="3.4" width="3" height="1"/>
    <rect x="25.5" y="5.5" width="7" height="1"/>
    <rect x="25.5" y="7.6" width="3" height="1"/>
    <rect x="29.5" y="7.6" width="3" height="1"/>
    <!-- Bottom-right · Gon ☷ (three broken) -->
    <rect x="25.5" y="15.4" width="3" height="1"/>
    <rect x="29.5" y="15.4" width="3" height="1"/>
    <rect x="25.5" y="17.5" width="3" height="1"/>
    <rect x="29.5" y="17.5" width="3" height="1"/>
    <rect x="25.5" y="19.6" width="3" height="1"/>
    <rect x="29.5" y="19.6" width="3" height="1"/>
  </g>
</svg>

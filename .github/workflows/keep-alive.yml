name: Keep Render instance awake

# Render's free plan spins the service down after ~15 minutes with no traffic and
# pays a 30-60s cold-start on the next request. Pinging the health endpoint on a
# tighter cadence than that keeps it warm - this workflow needs no secrets or
# external accounts, just GitHub's own scheduler.
#
# Caveat: GitHub disables scheduled workflows after 60 days with no commits to the
# repo, and cron firing can be delayed a few minutes under GitHub-wide load - both
# are outside this workflow's control.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 20 https://kospi-predictor.onrender.com/api/health
